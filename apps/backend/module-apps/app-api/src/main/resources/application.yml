spring:
  application:
    name: board-api
  datasource:
    # 로컬 postgres(5432) 기본값. compose postgres는 호스트 5433에 노출되므로 도커 밖 bootRun + compose postgres 조합이면 5433을 쓴다(compose 내부 백엔드는 env로 postgres:5432 주입).
    url: jdbc:postgresql://localhost:5432/boardapi
    username: boardapi
    password: boardapi
  jpa:
    hibernate:
      # 스키마는 Flyway가 소유하고 기동 시 엔티티↔DDL 일치만 검증한다.
      ddl-auto: validate
    # 경계 밖 지연로딩을 런타임에 차단한다.
    open-in-view: false
  threads:
    virtual:
      enabled: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        # 헬스 프로브(compose healthcheck) 용도만 — health 외 actuator 엔드포인트는 노출하지 않는다.
        include: health
  endpoint:
    health:
      # 집계 상태만으로는 DB indicator 반영 여부를 밖에서 확인할 수 없어 구성요소를 노출한다.
      show-components: always

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
