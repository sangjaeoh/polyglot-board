# FreezingArchRule 스토어 — 모듈 루트의 archunit-store/를 커밋해 동결 위반을 추적한다.
# allowStoreCreation=false: 스토어(디렉터리·stored.rules) 부재 시 실패 — working dir 어긋남을 시끄럽게 잡는다.
# allowStoreUpdate 기본 true: 위반 해소 시 스토어가 자기청산된다(T8의 PaginationRequest 적용 시 로컬 갱신·커밋).
# 주의: 스토어가 존재하는 상태에서 신규 freeze 규칙을 추가하면 첫 실행이 현행 위반을 자동 베이스라인화한다 —
# 신규 동결 추가 시 스토어 diff를 리뷰로 확인한다.
freeze.store.default.path=archunit-store
freeze.store.default.allowStoreCreation=false
